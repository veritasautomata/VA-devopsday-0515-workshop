# Two-container topology: opencode runs on an internal-only network and can
# only reach pipelock. Pipelock is the only container with internet access,
# enforcing the egress policy defined in pipelock.yaml.
#
# Networks:
#   - egress:   has internet,            attached to: pipelock
#   - internal: NO internet (no gateway), attached to: pipelock + agent
#
# The agent's only route off-host is via http://pipelock:8888 on the internal
# network. Direct outbound from the agent container is dropped by Docker
# because the internal network has no gateway.

services:
  pipelock:
    image: ghcr.io/luckypipewrench/pipelock:latest
    container_name: pipelock
    restart: unless-stopped
    command:
      - run
      - --config
      - /config/pipelock.yaml
      - --listen
      - 0.0.0.0:8888
    volumes:
      - ./pipelock.yaml:/config/pipelock.yaml:ro
      - pipelock-logs:/var/log/pipelock
    networks:
      - egress     # outbound internet for the proxy itself
      - internal   # reachable by the agent
    # Optional: expose stats/metrics to the host for debugging.
    # Comment this out if you don't want pipelock reachable from your host.
    ports:
      - "127.0.0.1:8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent:
    # Custom image: bun + opencode + pipelock binary on PATH. See Dockerfile.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Bump these deliberately. Both default to known-good versions.
        PIPELOCK_VERSION: v0.1.4
        OPENCODE_VERSION: latest
    image: opencode-pipelock-agent:local
    container_name: opencode-agent
    restart: "no"
    depends_on:
      pipelock:
        condition: service_healthy
    working_dir: /workspace
    # Drop into a shell. Run `opencode` from there, or use
    # `docker compose run --rm agent opencode` to launch the TUI directly.
    command: ["sh"]
    stdin_open: true
    tty: true
    environment:
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:?set OPENCODE_API_KEY in .env}
      # Make HTTP-aware clients (curl, wget, Node/Bun fetch) route through
      # pipelock. This is belt-and-suspenders — the network-level isolation
      # below is what actually enforces the boundary.
      HTTP_PROXY: http://pipelock:8888
      HTTPS_PROXY: http://pipelock:8888
      NO_PROXY: localhost,127.0.0.1,pipelock
    volumes:
      - ./workspace:/workspace
      - ./opencode.json:/root/.config/opencode/opencode.json:ro
      # The same pipelock.yaml is mounted into both containers so they
      # agree on the policy (pipelock enforces egress; the agent uses it
      # via `pipelock mcp proxy` for response scanning on MCP servers).
      - ./pipelock.yaml:/etc/pipelock/pipelock.yaml:ro
      - opencode-data:/root/.local/share/opencode
    networks:
      - internal   # ONLY the internal network — no direct internet
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  egress:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # the critical line: no NAT to the host's internet

volumes:
  pipelock-logs:
  opencode-data:
